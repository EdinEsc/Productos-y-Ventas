services:
  sales-cleanup:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sales-cleanup-service
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      # Sobreescribir la ruta de la llave SSH para que apunte
      # al archivo montado dentro del contenedor
      - SSH_KEY_PATH=/app/ssh-keys/bastion.pem
    volumes:
      # Montar la llave SSH (ajustar la ruta local si es necesario)
      # Windows: usar la ruta completa con barras normales
      - ${SSH_KEY_PATH_LOCAL:-C:/Users/HOME/Downloads/bastion.pem}:/app/ssh-keys/bastion.pem:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/test-db/db1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
